<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>✨ My Task Manager</h1>
            <div class="header-controls">
                <div class="view-toggle">
                    <button class="view-btn active" data-view="list">📋 List</button>
                    <button class="view-btn" data-view="agenda">📅 Agenda</button>
                    <button class="view-btn" data-view="calendar">🗓️ Calendar</button>
                </div>
                <div id="user-info" style="display: none;">
                    <img id="user-picture" src="" alt="Profile">
                    <span id="user-name"></span>
                    <button id="logout-btn">Logout</button>
                </div>
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="pill"
                     data-theme="filled_pink"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>
        </header>

        <main>
            <div class="task-input-section">
                <h2>Add New Task</h2>
                <form id="task-form">
                    <div class="form-row">
                        <input type="text" id="task-title" placeholder="Task title" required>
                        <select id="task-priority">
                            <option value="High">🔴 High</option>
                            <option value="Medium" selected>🟡 Medium</option>
                            <option value="Low">🟢 Low</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <input type="date" id="task-due-date">
                        <input type="time" id="task-due-time">
                        <input type="number" id="task-hours" placeholder="Est. hours" min="0.5" step="0.5">
                    </div>
                    <div class="form-row">
                        <input type="text" id="task-assigned-by" placeholder="Assigned by (optional)">
                        <select id="task-status">
                            <option value="Todo">📌 Todo</option>
                            <option value="In Progress">⚡ In Progress</option>
                            <option value="Done">✅ Done</option>
                            <option value="Blocked">🚫 Blocked</option>
                        </select>
                    </div>
                    <textarea id="task-notes" placeholder="Notes (optional)"></textarea>
                    <button type="submit">➕ Add Task</button>
                </form>
            </div>

            <div class="views-container">
                <!-- List View -->
                <div id="list-view" class="view-content">
                    <h2>Tasks</h2>
                    <ul id="task-list" class="sortable-list">
                        <!-- Tasks will be dynamically added here -->
                    </ul>
                </div
